name: skill_bridge
description: "Skill Bridge - Bridge Your Skills to Your Future"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.2
  http: ^1.2.1
  cupertino_icons: ^1.0.2
  gap: ^3.0.1
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  file_picker: ^11.0.2
  flutter_tts: ^4.2.5
  flutter_markdown: ^0.7.4
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
